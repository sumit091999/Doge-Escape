<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/DogeEscape-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DogeEscape</title>

  <!-- Google Fonts - Comic Neue + Orbitron -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Orbitron:wght@400;500;600;700;800;900&family=Pixelify+Sans:wght@600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* Loading screen styles */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f0c08;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-text {
      font-family: 'Silkscreen', cursive;
      color: #f0b429;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-dots {
      display: flex;
      gap: 10px;
    }

    .loading-dot {
      width: 15px;
      height: 15px;
      background: #f7c948;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="loading-text">Loading DogeEscape...</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Remove loading screen when React app is ready
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => loadingScreen.remove(), 500);
        }
      }, 1000);
    });
  </script>
</body>

</html>
